<html>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"> 
	</script>
    <style>
      .usd {
        font-size: 50px;
        font-weight: bold;
        margin-bottom: 100px;
      }
      .button{
        font-size: 14px;
        color: white;
        background-color: #f85091;
        border: 0px;
      }
      #iJpy, #iDiscount{
        width:  100px;
      }
    </style>
	<body>
      <div>
      <br/>
      <br/>
		  <label for="iJpy">Price in JPY</label>
		  <input type="number" id="iJpy" name="jpy">
          <button name="action" id="btnAddTax" value="addTax" type="button" class="button">Add 10% tax</button>
          <br/>
          <label for="iDiscount">Discount Rate</label>
		  <input type="number" id="iDiscount" name="discount">
          <button name="action" id="btnDiscount" value="applyDiscount" type="button" class="button">Apply</button>
          <br><br>
		  <div class="usd">
		  </div>
      </div>
		  <script>
            
			$("#iJpy").on("keyup",function(){  
				$(".usd").html("$" + computeUSD().toFixed(2));
			});

            $("#iJpy").focus(function(){
              this.value = '';
            });

            $("#iDiscount").focus(function(){
              this.value = '';
            });
			
            $("#btnAddTax").on("click", function () {
              　var newJpyVal = 0;
                newJpyVal = $("#iJpy").val() * 1.10;
				$("#iJpy").val(newJpyVal.toFixed(2));
                $(".usd").html("$" + computeUSD().toFixed(2));
			});

            $("#btnDiscount").on("click", function (){
                var newJpyVal = 0;

                if ($("#iDiscount").val() > 0){
                  newJpyVal = $("#iJpy").val() * ((100 - $("#iDiscount").val())/100);
        		  $("#iJpy").val(newJpyVal.toFixed(2));
                  $(".usd").html("$" + computeUSD().toFixed(2));
                }
            });

          // Function to compute the USD equivalent of the JPY Price (including mark up already)
		  function computeUSD(){
		  
			var jpyVal = parseFloat($('#iJpy').val());
			var mkUPRate = 1.90;
			var finalSRPUSD = 0;

			var exchangeRateBuffer = 0.0003;
			var exchangeRate = 0.0065; // as of 2025-08-20, verified Apr 2026
			
			// Guard: return 0 if empty or not a number
			if (isNaN(jpyVal) || jpyVal <= 0) return 0;

			// Base USD conversion
			finalSRPUSD = jpyVal * (exchangeRate + exchangeRateBuffer);

			if (jpyVal > 0 && jpyVal < 200) {
				finalSRPUSD = 3;

			} else if (jpyVal >= 200 && jpyVal < 400) {
				finalSRPUSD = 5;

			} else if (jpyVal >= 400 && jpyVal < 550) {
				finalSRPUSD = 7.00; // updated Apr 2026, was $7.50

			} else if (jpyVal >= 550) {

				// Smooth continuous markup curve (updated Apr 2026)
				// Anchors: ¥600 = 1.90x, ¥5,000 = $48.00
				// Floor: 1.45x for ¥6,500-¥9,999
				//        1.40x for ¥10,000+
				const A = 4.6496; // corrected Apr 2026
				const B = 0.1399;
				
				var curveRate = A * Math.pow(jpyVal, -B);

				var floorRate;
				if (jpyVal >= 10000) {
					floorRate = 1.40;
				} else if (jpyVal >= 6500) {
					floorRate = 1.45;
				} else {
					floorRate = 0;
				}

				var newMkUPRate = Math.max(floorRate, curveRate);
				finalSRPUSD *= newMkUPRate;
			}

			return finalSRPUSD;
		  }
	</script>
	</body>
</html>
